<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;
  --paper:#faf8f4;
  --rule:#d4cfc6;
  --muted:#7a756e;
  --accent:#b5451b;
  --tag-gf-bg:#f0ede8;--tag-gf:#5a4e42;
  --tag-th-bg:#fdf0eb;--tag-th:#8a3515;
  --tag-cr-bg:#fdf2f2;--tag-cr:#8a2020;
  --tag-hi-bg:#edf5ef;--tag-hi:#2d5e38;
  --tag-mc-bg:#edf1f8;--tag-mc:#2a4070;
  --tag-cl-bg:#f0f0f0;--tag-cl:#404040;
  --tag-nf-bg:#fdf7e8;--tag-nf:#6b5010;
  --tag-ho-bg:#f8edf5;--tag-ho:#5e2a5a;
  --tag-ot-bg:#f5f5f5;--tag-ot:#606060;
}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh}

header{padding:28px 20px 20px;border-bottom:1px solid var(--rule);position:sticky;top:0;background:var(--paper);z-index:100}
.header-top{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-0.01em}
.edition{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}

.search-wrap{position:relative;margin-bottom:14px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#search{width:100%;padding:10px 12px 10px 38px;font-size:15px;font-family:'Inter',sans-serif;border:1px solid var(--rule);border-radius:6px;background:#fff;color:var(--ink);outline:none;-webkit-appearance:none}
#search:focus{border-color:#999}

.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--rule);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:all .15s}
.pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}

main{padding:0 20px 40px;max-width:720px;margin:0 auto}

.stats-bar{padding:14px 0 6px;font-size:12px;color:var(--muted);letter-spacing:.04em;border-bottom:1px solid var(--rule);margin-bottom:0}

.section{margin-top:28px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.section-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;font-style:italic}
.section-count{font-size:12px;color:var(--muted);padding:2px 8px;border:1px solid var(--rule);border-radius:10px}

.book-list{display:flex;flex-direction:column;gap:0}
.book-item{border-bottom:1px solid var(--rule)}
.book-item:last-child{border-bottom:none}
.book-row{display:flex;align-items:center;gap:10px;padding:11px 0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.book-row:active .book-title{opacity:.7}
.chevron{flex-shrink:0;color:var(--muted);transition:transform .2s;margin-left:2px}
.book-item.open .chevron{transform:rotate(90deg)}
.book-info{flex:1;min-width:0}
.book-title{font-size:15px;font-weight:500;color:var(--ink);line-height:1.3}
.book-author{font-size:13px;color:var(--muted);margin-top:2px}
.new-tag{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;background:var(--accent);color:#fff;flex-shrink:0}

.book-panel{display:none;padding:0 0 14px 0}
.book-item.open .book-panel{display:block}
.book-desc{font-size:14px;line-height:1.65;color:#3a3530;margin-bottom:12px;font-family:'Playfair Display',serif;font-style:italic}
.book-desc.loading{color:var(--muted);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.search-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-family:'Inter',sans-serif;color:var(--muted);text-decoration:none;padding:4px 10px;border:1px solid var(--rule);border-radius:4px;background:#fff;transition:border-color .15s,color .15s}
.search-link:hover{color:var(--ink);border-color:#999}
.search-link svg{flex-shrink:0}

#no-results{padding:48px 0;text-align:center;color:var(--muted);font-style:italic;font-family:'Playfair Display',serif;font-size:18px;display:none}
</style>
</head>

function fetchDesc(title, author, el){
  const key=title+'||'+author;
  const fallback=DESCS[key]||'';
  // Show baked-in description instantly so there's no wait
  if(fallback){el.textContent=fallback;el.className='book-desc';}
  else{el.textContent='Loading…';el.className='book-desc loading';}
  // Then fetch a richer live AI description in the background
  fetch('/api/describe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,author})})
    .then(r=>r.ok?r.text():null)
    .then(text=>{if(text&&text.trim()){el.textContent=text;el.className='book-desc';}})
    .catch(()=>{});
}

function toggleItem(item, title, author){
  item.classList.toggle('open');
  const descEl=item.querySelector('.book-desc');
  if(!descEl.dataset.loaded){
    descEl.dataset.loaded='1';
    fetchDesc(title,author,descEl);
  }
}

function render(){
  const filtered=books.filter(b=>{
    const gm=active==="All"||b.g===active;
    const qm=!q||(b.t.toLowerCase().includes(q)||b.a.toLowerCase().includes(q));
    return gm&&qm;
  });

  document.getElementById('stats').textContent=
    filtered.length===books.length
      ? `${books.length} books across ${CATS.length} genres`
      : `${filtered.length} of ${books.length} books`;

  if(!filtered.length){
    document.getElementById('content').innerHTML='';
    document.getElementById('no-results').style.display='block';
    return;
  }
  document.getElementById('no-results').style.display='none';

  const grouped={};
  filtered.forEach(b=>{ (grouped[b.g]=grouped[b.g]||[]).push(b); });

  let html='';
  CATS.forEach(cat=>{
    const items=grouped[cat.key];
    if(!items||!items.length) return;
    items.sort((a,b)=>a.a.localeCompare(b.a));
    html+=`<div class="section">
      <div class="section-head">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${cat.dot};flex-shrink:0"></span>
        <span class="section-title" style="color:${cat.col}">${cat.label}</span>
        <span class="section-count">${items.length}</span>
      </div>
      <div class="book-list">`;
    items.forEach(b=>{
      const googleUrl='https://www.google.com/search?q='+encodeURIComponent(b.t+' '+b.a+' book');
      const id='b-'+Math.random().toString(36).slice(2);
      html+=`<div class="book-item" id="${id}">
        <div class="book-row" onclick="toggleItem(document.getElementById('${id}'),'${b.t.replace(/'/g,"\\'")}','${b.a.replace(/'/g,"\\'")}')">
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          <div class="book-info">
            <div class="book-title">${b.t}</div>
            <div class="book-author">${b.a}</div>
          </div>
          ${b.n?'<span class="new-tag">New</span>':''}
        </div>
        <div class="book-panel">
          <p class="book-desc"></p>
          <a class="search-link" href="${googleUrl}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Search on Google
          </a>
        </div>
      </div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('content').innerHTML=html;
}

// Pills
const pillsEl=document.getElementById('pills');
const allCats=["All",...CATS.map(c=>c.key)];
allCats.forEach(k=>{
  const cnt=k==="All"?books.length:books.filter(b=>b.g===k).length;
  const btn=document.createElement('button');
  btn.className='pill'+(k==="All"?" active":"");
  btn.textContent=k==="All"?`All books (${cnt})`:`${k} (${cnt})`;
  btn.onclick=()=>{
    active=k;
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  pillsEl.appendChild(btn);
});

document.getElementById('search').addEventListener('input',e=>{
  q=e.target.value.toLowerCase().trim();
  render();
});

render();
</script>
